appId: com.imaginai.app
productName: ImaginAI
directories:
  output: release
  buildResources: build
artifactName: "imaginai-${version}-${os}-${arch}.${ext}"
portable:
  artifactName: "imaginai-${version}-${os}-${arch}-portable.${ext}"
  buildUniversalInstaller: false
publish:
  provider: github
  owner: kakehashi-inc
  repo: https://github.com/kakehashi-inc/imagin-ai
  releaseType: release
releaseInfo:
  releaseName: "v${version}"
  releaseNotes: |
    ## New Features

    -

    ## Bug Fixes

    - Fix Veo video generation to auto-generate a random seed when not specified, persist it in history JSON, and reflect it in the UI parameter panel

files:
  - dist/**/*
  - public/**/*
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/*.map"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"

win:
  icon: public/icon.ico
  executableName: imaginai
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
        - arm64

nsis:
  shortcutName: ImaginAI
  buildUniversalInstaller: false
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: true

mac:
  category: public.app-category.graphics-design
  icon: public/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  icon: public/icon.png
  category: Graphics
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
  desktop:
    entry:
      Name: ImaginAI
      Comment: "A desktop application that allows you to control an AI image generation API via a dedicated GUI."
      Categories: Graphics;
