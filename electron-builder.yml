appId: com.imaginai.app
productName: ImaginAI
directories:
  output: release
  buildResources: build
artifactName: "imaginai-${version}-${os}-${arch}.${ext}"
portable:
  artifactName: "imaginai-${version}-${os}-${arch}-portable.${ext}"
  buildUniversalInstaller: false
publish:
  provider: github
  owner: kakehashi-inc
  repo: https://github.com/kakehashi-inc/imagin-ai
  releaseType: release
releaseInfo:
  releaseName: "v${version}"
  releaseNotes: |
    ## New Features

    - History limit increased from 200 to 10,000 entries with infinite scroll
    - New model: Veo 3.1 Lite (low-cost video generation)
    - Generation time is now recorded and displayed in history entries
    - Per-resolution pricing is now shown for Nano Banana 2 and Nano Banana Pro
    - Default aspect ratio changed to 16:9
    - Error messages now show a "Details" link to view the full API response
    - Model filter dropdown added to history panel
    - History search box now has a clear button
    - DevTools can be opened with F12 in production builds
    - Imagen 4 shutdown notice (2026/6/24) displayed in model selector
    - Model pricing updated to latest official rates (2026/4/2)

    ## Bug Fixes

    - Fixed error messages showing untranslated text
    - Fixed history panel freezing when loading many thumbnails
    - Fixed Veo video generation being interrupted before completion

files:
  - dist/**/*
  - public/**/*
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/*.map"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"

win:
  icon: public/icon.ico
  executableName: imaginai
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
        - arm64

nsis:
  shortcutName: ImaginAI
  buildUniversalInstaller: false
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: true

mac:
  category: public.app-category.graphics-design
  icon: public/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  icon: public/icon.png
  category: Graphics
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
  desktop:
    entry:
      Name: ImaginAI
      Comment: "A desktop application for controlling AI image/video/music generation APIs through a dedicated GUI."
      Categories: Graphics;AudioVideo;
